<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SezR Matematik | Yaz Dersleri</title>

<meta name="description" content="Birebir ve grup matematik dersleri. Eksiklerini kapat, yeni döneme güçlü başla.">

<!-- 🔥 LINK KART -->
<meta property="og:title" content="SezR Matematik Yaz Dersleri">

<style>
*{box-sizing:border-box}
body{margin:0;font-family:Inter;background:#020617;color:#fff}

/* BACKGROUND */
.page{
min-height:100vh;
padding:28px 16px;
background:
linear-gradient(rgba(2,6,23,.82),rgba(2,6,23,.95)),
url("math-bg.jpg");
background-size:cover;
background-position:center;
}

/* PROFILE */
.profile{
width:260px;height:260px;margin:0 auto 22px;border-radius:50%;position:relative;
}

/* 🔥 DAHA İNCE */
.profile:before{
content:"";
position:absolute;
inset:-4px;
border-radius:50%;
background:conic-gradient(from 10deg,#facc15,#38bdf8,#f97316);
animation:spinRight 60s linear infinite;
filter:blur(1px);
}

/* 🔥 ÇOK İNCE HALKA */
.profile:after{
content:"";
position:absolute;
inset:-10px;
border-radius:50%;
border:1.5px solid transparent;
border-top-color:#facc15;
border-right-color:#38bdf8;
animation:spinLeft 80s linear infinite;
}

@keyframes spinRight{to{transform:rotate(360deg)}}
@keyframes spinLeft{to{transform:rotate(-360deg)}}

.profile img{
position:absolute;
inset:6px;
width:calc(100% - 12px);
height:calc(100% - 12px);
object-fit:cover;
border-radius:50%;
border:2px solid #fff;
}

/* TEXT */
.brand{font-family:Montserrat;font-size:58px;font-weight:900;text-align:center}
.brand span{color:#facc15}

.badge{
display:block;
margin:18px auto;
padding:10px 30px;
border-radius:999px;
border:2px solid #facc15;
color:#facc15;
font-weight:900;
text-align:center;
width:max-content;
}

h1{text-align:center;font-size:32px}
h1 .big{display:block;color:#facc15;font-size:48px}

/* BUTTON */
.button{
display:flex;
align-items:center;
justify-content:center;
gap:10px;
margin:30px auto;
padding:14px 24px;
width:fit-content;
background:linear-gradient(#25d366,#128c4a);
border-radius:14px;
text-decoration:none;
color:white;
font-weight:900;
}

.button img{width:26px}
</style>
</head>

<body>

<div class="page">

<div class="profile">
<img src="profil.jpg?v=10">
</div>

<div class="brand">Sez<span>R</span> Matematik</div>

<div class="badge">2026 YAZ DÖNEMİ KAYITLARI</div>

<h1>
MATEMATİKTE EKSİKLERİNİ KAPAT,
<span class="big">YENİ DÖNEME GÜÇLÜ BAŞLA!</span>
</h1>

<a class="button" href="https://wa.me/905058266949">
<img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg">
Bana Uygun Programı Sor
</a>

</div>

</body>
</html>
