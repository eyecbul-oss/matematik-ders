
<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>SezR Focus</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="overlay"></div>

<header class="topbar">
<div class="logo">Sez<span>R</span> Matematik</div>
<nav>
<a>Ana Sayfa</a>
<a>Derslerim</a>
<a>YouTube</a>
<a class="active">Focus</a>
</nav>
</header>

<section class="hero">
<div class="info-card" id="focusInfo">
<h2>Focus Bilgileri</h2>
<p>Mod: Ders Çalışma</p>
<p>Süre: <span id="selectedTime">25</span> Dakika</p>
<p>Müzik: Piyano</p>
<small>5 saniye sonra gizlenir...</small>
</div>

<div class="scene">
<img src="https://images.unsplash.com/photo-1506784983877-45594efa4cbe?q=80&w=1400&auto=format&fit=crop">
<div class="timer-floating" id="timerBox">25:00</div>
<div class="quote" id="quoteBox">“Disiplin motivasyondan güçlüdür.”</div>
</div>
</section>

<section class="controls">
<div class="panel">
<h3>Süre</h3>
<div class="chips">
<button onclick="setTime(25)">25 dk</button>
<button onclick="setTime(50)">50 dk</button>
<button onclick="setTime(75)">75 dk</button>
</div>
</div>

<div class="panel">
<h3>Atmosfer</h3>
<div class="chips">
<button>Yağmurlu</button>
<button>Gece</button>
<button>Karlı</button>
<button>Loş</button>
</div>
</div>
</section>

<script src="script.js"></script>
</body>
</html>
