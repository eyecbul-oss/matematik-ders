<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SezR Matematik | Focus</title>
  <link rel="stylesheet" href="focus.css" />
</head>
<body>
  <header class="topbar" id="topbar">
    <div class="brand">Sez<span>R</span> Matematik</div>
    <nav>
      <a href="index.html">Ana Sayfa</a>
      <a href="dersler.html">Derslerim</a>
      <a href="youtube.html">YouTube</a>
      <a href="pdf.html">PDF</a>
      <a class="active" href="focus.html">Focus</a>
      <a href="iletisim.html">Kayıt</a>
    </nav>
  </header>

  <main class="focusApp">
    <section class="cinema" id="cinema">
      <img id="sceneImg" class="sceneImg" src="erkek-gun-isigi.png" alt="SezR Focus ortamı" />

      <div class="shade"></div>
      <div class="weather" id="weather"></div>

      <div class="hud topLeft" id="focusHud">
        <div class="pill" id="modeLabel">☀️ Erkek • Gün Işığı</div>
        <div class="infoBox">
          <h3>Focus Bilgileri</h3>
          <p><b>Mod</b><span id="infoMode">Ders Çalışma</span></p>
          <p><b>Süre</b><span id="infoTime">25 Dakika</span></p>
          <p><b>Müzik</b><span id="infoMusic">Piyano</span></p>
          <p><b>Hedef</b><span id="infoGoal">Bir soru daha çöz.</span></p>
          <small>5 saniye sonra odak moduna geçilecek...</small>
        </div>
      </div>

      <!-- Sayaç laptop ekranının üstüne sabitlenir -->
      <button class="laptopHotspot" id="laptopHotspot" aria-label="Odak modunu başlat">
        <div class="laptopTimer" id="laptopTimer">
          <div class="ring" id="timerRing">
            <span id="timerText">25:00</span>
            <small>Odak Süresi</small>
          </div>
          <em id="miniStatus">Başlat</em>
        </div>
      </button>

      <div class="quoteToast" id="quoteToast">Telefonu bırak, hedefe bak.</div>

      <button class="fullscreenBtn" id="fullscreenBtn">⛶ Tam Ekran</button>
    </section>

    <section class="setupPanel" id="setupPanel">
      <div class="group">
        <h3>Öğrenci Modu</h3>
        <div class="chips" id="genderChips">
          <button class="active" data-gender="erkek">Erkek</button>
          <button data-gender="kiz">Kız</button>
        </div>
      </div>

      <div class="group">
        <h3>Ortam</h3>
        <div class="chips" id="envChips">
          <button class="active" data-env="gun-isigi" data-icon="☀️" data-weather="">Gün Işığı</button>
          <button data-env="aksam" data-icon="🌇" data-weather="">Akşam</button>
          <button data-env="gece" data-icon="🌙" data-weather="stars">Gece</button>
          <button data-env="yagmurlu" data-icon="🌧️" data-weather="rain">Yağmurlu</button>
          <button data-env="karli" data-icon="❄️" data-weather="snow">Karlı</button>
          <button data-env="kamp-atesi" data-icon="🔥" data-weather="fire">Kamp Ateşi</button>
        </div>
      </div>

      <div class="group">
        <h3>Süre</h3>
        <div class="chips" id="durationChips">
          <button class="active" data-min="25">25 dk</button>
          <button data-min="35">35 dk</button>
          <button data-min="50">50 dk</button>
          <button data-min="75">75 dk</button>
          <button data-min="100">100 dk</button>
        </div>
      </div>

      <div class="group">
        <h3>Müzik</h3>
        <div class="chips" id="musicChips">
          <button class="active" data-name="Piyano" data-file="focus-piano.mp3">Piyano</button>
          <button data-name="Lo-fi" data-file="focus-lofi.mp3">Lo-fi</button>
          <button data-name="Yağmur" data-file="focus-rain.mp3">Yağmur</button>
          <button data-name="Kamp Ateşi" data-file="focus-fire.mp3">Ateş</button>
          <button data-name="Sessiz" data-file="">Sessiz</button>
        </div>
      </div>

      <div class="group goalGroup">
        <h3>Hedef</h3>
        <input id="goalInput" placeholder="Bugünkü hedefin ne?" />
      </div>

      <div class="actions">
        <button class="primary" id="startBtn">▶ Başlat</button>
        <button id="pauseBtn">Duraklat</button>
        <button id="resetBtn">Sıfırla</button>
      </div>
    </section>
  </main>

  <audio id="focusAudio" preload="auto"></audio>
  <script src="focus.js"></script>
</body>
</html>
