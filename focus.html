<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SezR Focus</title>
<link rel="stylesheet" href="focus.css">
</head>
<body>

<section class="hero">
  <div class="overlay"></div>

  <div class="hero-left">
    <span class="badge">SEZR FOCUS ROOM</span>
    <h1>Loş Masa</h1>
    <p>Sakin ve loş bir çalışma ortamı. Dikkatini topla, zamanı yönet ve hedeflerine odaklan.</p>
  </div>

  <div class="laptop-timer">
    <div class="timer-ring">
      <span id="heroTimer">25:00</span>
      <small>Odak Süresi</small>
    </div>
  </div>
</section>

<section class="dashboard">

<div class="card">
<h3>Süre Seç</h3>
<div class="pills">
<button class="active">25 dk</button>
<button>50 dk</button>
<button>75 dk</button>
<button>100 dk</button>
</div>
</div>

<div class="card">
<h3>Müzik Seç</h3>
<div class="pills">
<button class="active">Piyano</button>
<button>Lo-fi</button>
<button>Jazz</button>
<button>Doğa</button>
</div>
</div>

<div class="card">
<h3>Hedef Belirle</h3>
<input placeholder="Bugün neyi başarmak istiyorsun?">
</div>

<div class="timer-card">
<div class="main-time" id="mainTimer">25:00</div>
<div class="status">Odak modu hazır</div>

<div class="actions">
<button class="yellow">Başlat</button>
<button>Duraklat</button>
<button class="red">Sıfırla</button>
</div>
</div>

</section>

<script src="focus.js"></script>
</body>
</html>
