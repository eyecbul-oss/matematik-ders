<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SezR Matematik | Çevrimdışı</title>
<style>
*{box-sizing:border-box}
body{
margin:0;
min-height:100vh;
display:flex;
align-items:center;
justify-content:center;
font-family:Arial,sans-serif;
background:
radial-gradient(circle at 20% 10%,rgba(56,189,248,.22),transparent 30%),
radial-gradient(circle at 80% 20%,rgba(250,204,21,.2),transparent 30%),
#020617;
color:white;
padding:22px;
}
.card{
max-width:520px;
width:100%;
padding:32px;
border-radius:28px;
background:rgba(2,6,23,.72);
border:1px solid rgba(148,163,184,.24);
box-shadow:0 18px 44px rgba(0,0,0,.42);
text-align:center;
}
.logo{
font-size:42px;
font-weight:900;
margin-bottom:14px;
}
.logo span{color:#facc15}
h1{
font-size:28px;
margin:0 0 12px;
}
p{
color:#dbeafe;
line-height:1.6;
font-size:16px;
}
button{
margin-top:20px;
border:0;
border-radius:16px;
padding:14px 20px;
background:#25d366;
color:white;
font-weight:900;
font-size:16px;
}
</style>
</head>
<body>
<div class="card">
<div class="logo">Sez<span>R</span></div>
<h1>Şu an çevrimdışısın</h1>
<p>İnternet bağlantısı geldiğinde SezR Matematik sayfasını tekrar açabilirsin. Daha önce açılan içerikler uygulama önbelleğinden çalışabilir.</p>
<button onclick="location.reload()">Tekrar Dene</button>
</div>
</body>
</html>
